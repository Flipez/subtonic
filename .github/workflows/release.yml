name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64 }
          - { os: macos-latest,   goos: darwin,  goarch: amd64 }
          - { os: macos-latest,   goos: darwin,  goarch: arm64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ALSA (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y libasound2-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        shell: bash
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/subtonic-${{ github.ref_name }}-${GOOS}-${GOARCH}${EXT}" .

      - uses: actions/upload-artifact@v4
        with:
          name: subtonic-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
